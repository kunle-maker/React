<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VesselX - Offline</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .offline-container {
            max-width: 500px;
            padding: 40px 20px;
        }
        .offline-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 15px;
            font-weight: 600;
        }
        p {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        .retry-btn {
            background: white;
            color: #764ba2;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-bottom: 20px;
        }
        .retry-btn:hover {
            transform: scale(1.05);
        }
        .cached-posts {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .cached-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            opacity: 0.8;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1>You're Offline</h1>
        <p>Don't worry! VesselX is saving your connection for when you're back. Check out what's cached while you wait.</p>
        
        <button class="retry-btn" onclick="window.location.reload()">
            Try Reconnecting
        </button>

        <div class="cached-posts" id="cached-content">
            <div class="cached-title">📱 Available Offline</div>
            <p>Your recent posts and messages will appear here when you reconnect</p>
        </div>
    </div>

    <script>
        // Try to show any cached content if available
        if ('caches' in window) {
            caches.match('/').then(response => {
                if (response) {
                    document.getElementById('cached-content').innerHTML = 
                        '<div class="cached-title">✅ Cached Content Available</div>' +
                        '<p>You can still browse previously viewed posts</p>';
                }
            });
        }
    </script>
</body>
</html>
